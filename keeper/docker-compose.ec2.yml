# EC2 production stack — published keeper image + Redis + Postgres.
# Secrets live in /opt/leverx/keeper/.env (created by indexer/deploy/ec2-pull-keeper.sh).
services:
  redis:
    image: redis:7-alpine
    container_name: leverx-keeper-redis
    networks:
      - keeper
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: leverx-keeper-postgres
    environment:
      POSTGRES_USER: leverx
      POSTGRES_PASSWORD: leverx
      POSTGRES_DB: leverx_keeper
    volumes:
      - keeper_pg_data:/var/lib/postgresql/data
    networks:
      - keeper
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leverx -d leverx_keeper"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  keeper:
    image: devarogundade/leverx-keeper:latest
    container_name: leverx-keeper
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      PORT: "3001"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgres://leverx:leverx@postgres:5432/leverx_keeper
      DATABASE_SYNCHRONIZE: "true"
      DATABASE_LOGGING: "false"
      INDEXER_URL: http://host.docker.internal:3100
      SUI_RPC_URL: https://fullnode.testnet.sui.io:443
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - keeper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

networks:
  keeper:
    name: leverx-keeper

volumes:
  keeper_pg_data:
