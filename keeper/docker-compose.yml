services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leverx
      POSTGRES_PASSWORD: leverx
      POSTGRES_DB: leverx_indexer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leverx -d leverx_indexer"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  keeper:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "3001"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgres://leverx:leverx@postgres:5432/leverx_indexer
      DATABASE_SYNCHRONIZE: "true"
      DATABASE_LOGGING: "false"
      INDEXER_URL: https://indexer.suileverx.xyz
      SUI_RPC_URL: https://fullnode.testnet.sui.io:443
      LEVERX_PACKAGE_ID: 0x912790a57285b00507a2a7086fdb8695bf4df40ed693d718a00186b162fd5a1f
      LEVERX_REGISTRY_ID: 0x603a3c43f25f3856ce4adeabf9bd5468c34b727c1580986560e2f07ba415a344
      LEVERX_VAULT_ID: 0xaf348c16f498e509c80102b83ee2bf8c8d83981a29b4335003a0ced4055cccca
      LEVERX_FEE_COLLECTOR_ID: 0xcf794a3cba8d08b5009249a47bed91e9752d7a319c6d03d397b8ea672091ee5f
      PREDICT_PACKAGE_ID: 0xf5ea2b3749c65d6e56507cc35388719aadb28f9cab873696a2f8687f5c785138
      PREDICT_ID: 0xc8736204d12f0a7277c86388a68bf8a194b0a14c5538ad13f22cbd8e2a38028a
      PREDICT_SERVER_URL: https://predict-server.testnet.mystenlabs.com
      QUOTE_TYPE: 0xe95040085976bfd54a1a07225cd46c8a2b4e8e2b6732f140a0fc49850ba73e1a::dusdc::DUSDC
      TELEGRAM_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
