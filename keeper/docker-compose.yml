services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leverx
      POSTGRES_PASSWORD: leverx
      POSTGRES_DB: leverx_indexer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leverx -d leverx_indexer"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  keeper:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      PORT: "3001"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgres://leverx:leverx@postgres:5432/leverx_indexer
      DATABASE_SYNCHRONIZE: "true"
      DATABASE_LOGGING: "false"
      INDEXER_URL: http://host.docker.internal:3100
      SUI_RPC_URL: https://fullnode.testnet.sui.io:443
      LEVERX_PACKAGE_ID: 0x97b41ca2ed4948d2b448ca4031d1727ee2dfd2c1e9c086748c758e069a366825
      LEVERX_REGISTRY_ID: 0xc165f33bffbdaf02209690f4ad7aa5090aa214bcba80e23d9be6e52db676de93
      LEVERX_VAULT_ID: 0x249afdb0a91126b12c262dc57ee871582376874b65ad857df54887a2145c96f3
      LEVERX_FEE_COLLECTOR_ID: 0xcdcee4fd12114732e8933039a3bbb3954b7db70444f351eee8cf71a62d0452fa
      PREDICT_PACKAGE_ID: 0xf5ea2b3749c65d6e56507cc35388719aadb28f9cab873696a2f8687f5c785138
      PREDICT_ID: 0xc8736204d12f0a7277c86388a68bf8a194b0a14c5538ad13f22cbd8e2a38028a
      PREDICT_SERVER_URL: https://predict-server.testnet.mystenlabs.com
      QUOTE_TYPE: 0xe95040085976bfd54a1a07225cd46c8a2b4e8e2b6732f140a0fc49850ba73e1a::dusdc::DUSDC
      TELEGRAM_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
