upstream leverx_indexer {
    server 127.0.0.1:3100;
    keepalive 32;
}

# HTTP — ACME + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name indexer.suileverx.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — REST + WebSocket
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name indexer.suileverx.xyz;

    ssl_certificate /etc/letsencrypt/live/indexer.suileverx.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/indexer.suileverx.xyz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /v1/ws {
        proxy_pass http://leverx_indexer;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://leverx_indexer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
